<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Student Growth System</title>
  <link rel="stylesheet" href="css/style.css?v=22">
  <link rel="stylesheet" href="css/login.css?v=22">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="logo">🎓</div>
      <div class="logo-text">
        <h1>SAM System</h1>
        <p>STUDENT ALUMNI MENTORSHIP</p>
      </div>
    </div>
    <div class="header-center">
      Government College of Engineering, Erode
    </div>
    <div class="header-right">
      <button class="login-btn" onclick="goHome()">← Back</button>
    </div>
  </header>

  <!-- Breadcrumb -->
  <nav class="breadcrumb">
    <div class="breadcrumb-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
        <polyline points="9 22 9 12 15 12 15 22"></polyline>
      </svg>
    </div>
    <span class="breadcrumb-text">Login</span>
  </nav>

  <!-- Login Container -->
  <div class="login-container">
    <div class="login-card">
      <div class="login-icon">🔐</div>
      <h2 class="login-title">Admin Login</h2>
      <p class="login-subtitle">Enter your credentials to access the system</p>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter admin password"
            required
            autocomplete="off"
          >
        </div>

        <div id="errorMessage" class="error-message"></div>

        <button type="submit" class="login-submit-btn">Login</button>
      </form>

      <p class="login-hint">Hint: The password is "Admin"</p>
    </div>
  </div>

  <script src="js/auth.js?v=22"></script>
</body>
</html>
